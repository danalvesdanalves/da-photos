<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>da photos</title>
<link rel="icon" href="data:,">
<meta name="robots" content="noindex">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:image" content="">
<style>
  html, body { margin: 0; background: #000; color: #fff; font: 17px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; }
  main { max-width: 520px; margin: 0 auto; padding: 64px 24px 24px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px; }
  #spread { width: 196px; max-width: 100%; height: auto; object-fit: contain; display: block; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .info p, .info a { margin: 0; display: block; }
  .info { display: flex; flex-direction: column; gap: 6px; text-transform: uppercase; }
  a.buy { color: #fff; text-decoration: underline; }
  .drop { color: #ff2a1f; margin: 0; padding: 24px; text-align: center; text-transform: uppercase; animation: blink 1s steps(2, start) infinite; }
  @keyframes blink { to { visibility: hidden; } }
  @media (prefers-reduced-motion: reduce) { .drop { animation: none; } }
</style>
</head>
<body>
<main>
  <img id="spread" src="img/cover.png" alt="">
  <div class="info">
    <p>Dan Alves Photos Book</p>
    <p>$41</p>
    <p>Ships in 2 weeks</p>
    <a class="buy" href="https://buy.stripe.com/28E3cw0Hh06KcTw2sMgbm0J">Purchase here</a>
  </div>
</main>
<p class="drop">Only available for <span id="countdown">24:00:00</span></p>
<script>
  (function () {
    var img = document.getElementById('spread');
    var srcs = ['img/cover.png', 'img/1.jpg', 'img/2.jpg'];
    var i = 0;
    srcs.slice(1).forEach(function (s) { var p = new Image(); p.src = s; });
    img.addEventListener('click', function () {
      i = (i + 1) % srcs.length;
      img.src = srcs[i];
    });

    // Drop deadline — edit this ISO datetime to move the countdown.
    var DEADLINE = new Date('2026-07-11T21:00:00-07:00').getTime();
    var el = document.getElementById('countdown');
    function pad(n) { return (n < 10 ? '0' : '') + n; }
    function tick() {
      var ms = DEADLINE - Date.now();
      if (ms <= 0) { el.textContent = '00:00:00'; return; }
      var s = Math.floor(ms / 1000);
      el.textContent = pad(Math.floor(s / 3600)) + ':' + pad(Math.floor((s % 3600) / 60)) + ':' + pad(s % 60);
    }
    tick();
    setInterval(tick, 1000);
  })();
</script>
</body>
</html>
