<style>
  html, body { margin: 0; background: #000; color: #fff; font: 17px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  main { max-width: 520px; margin: 0 auto; padding: 8px 24px 24px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px; }
  #spread { width: 100%; max-width: 280px; height: auto; display: block; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .info p, .info a { margin: 0; display: block; }
  .info { display: flex; flex-direction: column; gap: 6px; text-transform: uppercase; }
  a.buy { color: #fff; text-decoration: underline; animation: blink 1s steps(2, start) infinite; }
  .drop { color: #ff2a1f; margin: 0; padding: 24px; text-align: center; text-transform: uppercase; animation: blink 1s steps(2, start) infinite; }
  @keyframes blink { to { visibility: hidden; } }
  @media (prefers-reduced-motion: reduce) { .drop, a.buy { animation: none; } }
</style>
</head>
<body>
<main>
  <img id="spread" src="img/cover.png" alt="">
  <div class="info">
    <p>Dan Alves Photos Book</p>
    <p>$41</p>
    <p>Ships in 2 weeks</p>
    <a class="buy" href="https://buy.stripe.com/28E3cw0Hh06KcTw2sMgbm0J">Purchase here</a>
  </div>
</main>
<p class="drop">24 hours only gone july 12</p>
<script>
  (function () {
    var img = document.getElementById('spread');
    var srcs = ['img/cover.png', 'img/1.jpg', 'img/2.jpg'];
    var i = 0;
    srcs.slice(1).forEach(function (s) { var p = new Image(); p.src = s; });
    img.addEventListener('click', function () {
      i = (i + 1) % srcs.length;
      img.src = srcs[i];
    });
  })();
</script>
</body>
